name: Deploy web preview (Firebase Hosting)

# For each pull request, builds the web export and deploys it to a temporary
# Firebase Hosting preview channel, then comments the preview URL on the PR.
# Guarded to same-repo PRs because secrets (and thus the deploy) are not
# available to pull requests from forks.
on:
  pull_request: {}

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GRAPPNEL }}
          projectId: grappnel
          expires: 7d
